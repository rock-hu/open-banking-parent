name: mvn-site-weekly
on:
  schedule:
    - cron: "0 0 * * 1"
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"
          cache: "maven"
      - name: mvn clean site
        run: mvn clean site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
